name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish a classic Docker v2 (schema2) manifest — NOT an OCI image
      # index — so any standard docker/containerd puller (including the
      # hackathon judge) can pull it. Without this, buildx wraps the image
      # in an OCI index + attestation manifest, and pullers that request the
      # Docker manifest media type get a 404 (the PULL_ERROR we hit).
      #   provenance=false        -> drop the attestation manifest (no index)
      #   oci-mediatypes=false    -> emit Docker schema2 media types
      - name: Build and push (Docker schema2, maximally compatible)
        run: |
          IMG=ghcr.io/${{ github.repository_owner }}/phoenix-router:latest
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --output type=registry,oci-mediatypes=false \
            --tag "$IMG" \
            .
